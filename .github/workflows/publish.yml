name: Build and deploy Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # - name: Install system libraries
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y \
      #       libcurl4-openssl-dev \
      #       libssl-dev \
      #       libxml2-dev \
      #       libuv1-dev


      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libuv1-dev \
            pkg-config


      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # ✅ Let R handle system + R dependencies correctly
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::httr
            any::jsonlite
            any::openxlsx
            any::yaml
            any::readxl
            any::dplyr
            any::knitr
            any::rmarkdown
            any::markdown

      # ✅ Build derived artefacts FIRST
      - name: Build Excel downloads from Zenodo
        env:
          ZENODO_API_KEY: ${{ secrets.ZENODO_API_KEY }}
        run: |
          Rscript peh_userdocumentation/scripts/build_all_downloads.R


      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # ✅ Render entire hub + subsite
      - name: Render Quarto site
        run: |
          quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
